name: Deploy

on:
  push:
    branches: [main]

jobs:
  migrate-and-deploy:
    name: Migrate & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to ps.kz VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/tournament-backend
            git pull origin main
            npm ci --omit=dev
            npm run build
            npm run db:migrate
            pm2 restart tournament-backend
            pm2 save
