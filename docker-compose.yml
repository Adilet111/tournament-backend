services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-tournament}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bind to loopback only. Docker bypasses ufw, so publishing on 0.0.0.0
      # exposes Postgres to the internet regardless of firewall rules. Reach it
      # from your machine via an SSH tunnel (localhost:5432 on the VPS).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-tournament}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    # First run: docker compose run --rm api node dist/db/migrate.js

volumes:
  pgdata:
