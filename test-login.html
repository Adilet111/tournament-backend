<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Get Google ID Token</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    textarea { width: 100%; height: 160px; margin-top: 16px; font-family: monospace; font-size: 12px; }
    button { margin-top: 12px; padding: 8px 14px; }
    code { background: #f0f0f0; padding: 2px 4px; }
  </style>
</head>
<body>
  <h2>Get a Google ID token</h2>
  <p>Sign in below. The <strong>ID token</strong> appears in the box — copy it into your curl as <code>idToken</code>.</p>

  <div id="g_id_onload"
       data-client_id="185372996340-2i6foeav3tuabsmi0ouvuokhtv0mbh5n.apps.googleusercontent.com"
       data-callback="onSignIn"></div>
  <div class="g_id_signin" data-type="standard"></div>

  <textarea id="token" readonly placeholder="ID token will show here after sign-in..."></textarea>
  <button onclick="copyToken()">Copy token</button>

  <script>
    function onSignIn(response) {
      document.getElementById('token').value = response.credential;
      console.log('ID token:', response.credential);
    }
    function copyToken() {
      const el = document.getElementById('token');
      el.select();
      navigator.clipboard.writeText(el.value);
    }
  </script>
</body>
</html>
